<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite para o Clã - Get Church</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0b; color: white; }
        .glass { background: rgba(22, 22, 24, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div id="app" class="w-full max-w-md">
        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-slate-500 font-medium">Carregando convite...</p>
        </div>

        <!-- Success State (Hidden) -->
        <div id="success" class="hidden text-center py-20">
            <div class="bg-green-500/10 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-green-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter mb-4">Presença Confirmada!</h1>
            <p class="text-slate-500 text-lg leading-relaxed">Tudo certo! Mal podemos esperar para te ver no clã. 🙏</p>
        </div>

        <!-- Main Content (Hidden until loaded) -->
        <div id="main-content" class="hidden">
            <!-- Clan Card -->
            <div class="glass p-8 rounded-[40px] mb-6 shadow-2xl">
                <p class="text-blue-500 text-[10px] font-black tracking-[4px] mb-2 uppercase">Você foi convidado para o clã</p>
                <h2 id="clan-name" class="text-4xl font-black tracking-tighter mb-8 leading-none text-white">...</h2>
                
                <div class="space-y-4">
                    <div class="flex items-center text-slate-400 font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span id="clan-date">Sexta-feira</span>
                    </div>
                    <div class="flex items-center text-slate-400 font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span id="clan-time">20:00</span>
                    </div>
                    <div class="flex items-center text-slate-400 font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span id="clan-location">Local em breve</span>
                    </div>
                </div>
            </div>

            <!-- Form Card -->
            <div class="glass p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-6 text-white">Confirme sua presença</h3>
                
                <div class="space-y-4">
                    <input type="text" id="nome" placeholder="Nome" class="w-full bg-[#0a0a0b] text-white px-6 py-4 rounded-2xl border border-white/5 focus:border-blue-500 outline-none transition-all font-medium">
                    <input type="text" id="sobrenome" placeholder="Sobrenome" class="w-full bg-[#0a0a0b] text-white px-6 py-4 rounded-2xl border border-white/5 focus:border-blue-500 outline-none transition-all font-medium">
                    <input type="tel" id="telefone" placeholder="WhatsApp (com DDD)" class="w-full bg-[#0a0a0b] text-white px-6 py-4 rounded-2xl border border-white/5 focus:border-blue-500 outline-none transition-all font-medium">
                    
                    <p class="text-slate-500 text-sm font-bold pt-4">Você é batizado(a)?</p>
                    <div class="flex gap-3">
                        <button onclick="setBatizado('Sim')" id="btn-sim" class="flex-1 bg-[#0a0a0b] border border-white/5 py-4 rounded-2xl font-bold text-slate-500 hover:border-blue-500 transition-all">Sim</button>
                        <button onclick="setBatizado('Não')" id="btn-nao" class="flex-1 bg-[#0a0a0b] border border-white/5 py-4 rounded-2xl font-bold text-slate-500 hover:border-blue-500 transition-all">Não</button>
                    </div>

                    <button onclick="handleSubmit()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-[28px] font-black text-lg uppercase tracking-widest mt-8 shadow-2xl shadow-blue-600/30 transition-all">
                        Eu Vou! 🚀
                    </button>
                </div>
            </div>

            <p class="text-center text-slate-700 text-[10px] font-black uppercase tracking-[4px] mt-12">Powered by Get Church</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bharigikjtlifxqlsokl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_0ZYIPvU_kw9vdjtO0YcliQ_iRGZqBtF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let batizado = null;
        let churchId = null;
        const clanId = new URLSearchParams(window.location.search).get('id');

        async function init() {
            if (!clanId) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Erro: ID do Clã não encontrado.</p>';
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('dash_get_fln_eventos_01')
                    .select('*')
                    .eq('sb_id_evento', clanId)
                    .single();

                if (error) throw error;

                churchId = data.church_id || 'f5d2343c-a215-4c34-87ef-12ac5ce17ef6'; // Fallback para ID da Letícia
                document.getElementById('clan-name').innerText = data.nome_evento.replace('GET FLN | [CLA] ', '');
                document.getElementById('clan-date').innerText = data.dia_semana_evento;
                document.getElementById('clan-time').innerText = data.horario_evento;
                document.getElementById('clan-location').innerText = data.local_evento || 'Local do Clã';

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Convite não encontrado ou expirado.</p>';
            }
        }

        function setBatizado(val) {
            batizado = val;
            document.getElementById('btn-sim').className = val === 'Sim' ? 'flex-1 bg-blue-600/10 border border-blue-500 py-4 rounded-2xl font-bold text-blue-500 transition-all' : 'flex-1 bg-[#0a0a0b] border border-white/5 py-4 rounded-2xl font-bold text-slate-500 transition-all';
            document.getElementById('btn-nao').className = val === 'Não' ? 'flex-1 bg-blue-600/10 border border-blue-500 py-4 rounded-2xl font-bold text-blue-500 transition-all' : 'flex-1 bg-[#0a0a0b] border border-white/5 py-4 rounded-2xl font-bold text-slate-500 transition-all';
        }

        async function handleSubmit() {
            const nome = document.getElementById('nome').value;
            const sobrenome = document.getElementById('sobrenome').value;
            const telefone = document.getElementById('telefone').value;
            const nomeCompleto = nome + ' ' + sobrenome;
            const nomeEvento = document.getElementById('clan-name').innerText;

            if (!nome || !sobrenome || !telefone || !batizado) {
                alert('Por favor, preencha todos os campos!');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Confirmando...';
            btn.disabled = true;

            try {
                // 1. Salva na tabela de Presença
                const { error: errorPresenca } = await supabaseClient.from('GET | Presenca').insert({
                    church_id: churchId,
                    id_calendar: clanId,
                    nome_contato: nomeCompleto,
                    nome_evento: 'GET FLN | [CLA] ' + nomeEvento,
                    tipo_presenca: 'CONFIRMADO',
                    id_presenca: crypto.randomUUID()
                });

                if (errorPresenca) throw errorPresenca;

                // 2. Salva ou atualiza no CRM (Contatos)
                const { error: errorContato } = await supabaseClient.from('GET | Contatos').insert({
                    id_contato: crypto.randomUUID(),
                    church_id: churchId,
                    nome_contato: nomeCompleto,
                    telefone: telefone,
                    batizado: batizado,
                    cla_principal: 'GET FLN | [CLA] ' + nomeEvento,
                    data_entrada: new Date().toISOString().split('T')[0]
                });

                if (errorContato) console.warn('Aviso: Contato não pôde ser criado, mas presença foi salva.');

                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert('Erro ao confirmar presença: ' + (err.message || 'Erro de campos'));
                btn.innerText = 'Eu Vou! 🚀';
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
